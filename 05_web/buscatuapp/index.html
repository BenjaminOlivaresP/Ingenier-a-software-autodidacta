<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscatuapp</title>

    <!-- Conexión con CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="sidebar">
        <h2>Categorías</h2>
        <ul>
            <li>📚 Estudio</li>
            <li>💻 Programación</li>
            <li>🎨 Diseño</li>
            <li>⚡ Productividad</li>
        </ul>
    </div>

    <div class="main">
        <div class="title">Buscatuapp</div>

        <div class="search-container">
            <input type="text" placeholder="Buscar herramienta...">
        </div>

        <h2>Herramientas populares</h2>

        <div class="cards">

            <div class="card">
                <h3>Canva</h3>
                <p>Diseño gráfico online</p>
                <a href="https://www.canva.com" target="_blank">Ir</a>
            </div>

            <div class="card">
                <h3>Notion</h3>
                <p>Organización y productividad</p>
                <a href="https://www.notion.so" target="_blank">Ir</a>
            </div>

            <div class="card">
                <h3>GitHub</h3>
                <p>Repositorios de código</p>
                <a href="https://github.com" target="_blank">Ir</a>
            </div>

            <div class="card">
                <h3>MDN Docs</h3>
                <p>Documentación web</p>
                <a href="https://developer.mozilla.org" target="_blank">Ir</a>
            </div>

        </div>
    </div>

</body>
</html>
